spring.application.name=backend

# ── Server ──
server.port=8080

# ── AI Provider Selection ──
# Choose: anthropic | openai | deepseek
ai.provider=deepseek

# ── DeepSeek (native starter) ──
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
spring.ai.deepseek.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com}
spring.ai.deepseek.chat.options.model=deepseek-v4-flash
spring.ai.deepseek.chat.options.temperature=0.7
spring.ai.deepseek.chat.options.timeout=300s

# ── Debug logging ──
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
logging.level.okhttp3=DEBUG
logging.level.com.qzcy.backend.service=DEBUG

# ── Database (default: H2 for dev) ──
spring.datasource.url=jdbc:h2:mem:demohelper;DB_CLOSE_DELAY=-1;MODE=MYSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# ── JPA / Hibernate ──
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── File Upload ──
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
