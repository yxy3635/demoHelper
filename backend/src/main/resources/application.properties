spring.application.name=backend

# ── Server ──
server.port=8080

# ── AI: server-side fallback defaults ──
# User-provided keys (from frontend settings) override these at request time.
ai.api-key=${AI_API_KEY:}
ai.base-url=${AI_BASE_URL:https://api.deepseek.com}
ai.model=${AI_MODEL:deepseek-v4-flash}

# Spring AI OpenAI auto-configuration (kept for potential future use)
spring.ai.openai.api-key=${AI_API_KEY:}
spring.ai.openai.base-url=${AI_BASE_URL:https://api.deepseek.com}
spring.ai.openai.chat.options.model=${AI_MODEL:deepseek-v4-flash}
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.timeout=300s

# ── Debug logging ──
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
logging.level.okhttp3=DEBUG
logging.level.com.qzcy.backend.service=DEBUG

# ── Database (default: H2 for dev) ──
spring.datasource.url=jdbc:h2:mem:demohelper;DB_CLOSE_DELAY=-1;MODE=MYSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# ── JPA / Hibernate ──
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── File Upload ──
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
