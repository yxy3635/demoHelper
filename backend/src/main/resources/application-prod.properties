# ── Production: MySQL ──
spring.datasource.url=jdbc:mysql://localhost:3306/demohelper?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# ── AI Provider (override via env vars) ──
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.base-url=${ANTHROPIC_BASE_URL:https://api.deepseek.com/anthropic}
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
